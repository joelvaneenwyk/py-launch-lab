name: Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "README.md"
      - "mkdocs.yml"
  workflow_run:
    workflows: ["Windows CI"]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  validate:
    name: Validate docs
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    steps:
      - uses: actions/checkout@v4

      - name: Check Markdown files exist
        run: |
          test -f README.md
          test -f docs/plan.md
          test -f docs/overview.md
          test -f docs/windows-launch-semantics.md
          test -f docs/scenario-matrix.md
          test -f mkdocs.yml
          echo "All docs present."

  deploy:
    name: Deploy to GitHub Pages
    needs: validate
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Download findings from Windows CI
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v4
        with:
          name: docs-findings
          path: docs/findings/
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Download HTML report from Windows CI
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v4
        with:
          name: scenario-report-html
          path: docs/findings/
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install docs dependencies
        run: uv sync --extra docs

      - name: Build docs with mkdocs
        run: uv run mkdocs build --strict

      - name: Copy HTML report to site root
        # Place the self-contained HTML report at the site root so it can be
        # accessed directly at <pages-url>/report.html without MkDocs wrapping.
        run: |
          if [ -f "docs/findings/report.html" ]; then
            cp docs/findings/report.html site/report.html
            echo "HTML report copied to site/report.html"
          else
            echo "No HTML report found; skipping copy."
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
