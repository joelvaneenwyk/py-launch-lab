name: Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "README.md"
      - "plan.md"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  validate:
    name: Validate docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check Markdown files exist
        run: |
          test -f README.md
          test -f plan.md
          test -f docs/overview.md
          test -f docs/windows-launch-semantics.md
          test -f docs/scenario-matrix.md
          echo "All docs present."

  deploy:
    name: Deploy to GitHub Pages
    needs: validate
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Build docs site
        run: |
          mkdir -p _site
          cp README.md _site/index.md
          cp plan.md _site/plan.md
          cp -r docs/* _site/
          # Generate a simple index page
          cat > _site/index.html <<'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <title>Python Launch Lab</title>
            <style>
              body { font-family: system-ui, sans-serif; max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
              a { color: #0366d6; }
              ul { line-height: 1.8; }
            </style>
          </head>
          <body>
            <h1>Python Launch Lab — Documentation</h1>
            <ul>
              <li><a href="overview.md">Architecture Overview</a></li>
              <li><a href="windows-launch-semantics.md">Windows Launch Semantics</a></li>
              <li><a href="scenario-matrix.md">Scenario Matrix</a></li>
              <li><a href="findings/">Findings</a></li>
              <li><a href="plan.md">Project Plan</a></li>
            </ul>
          </body>
          </html>
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
