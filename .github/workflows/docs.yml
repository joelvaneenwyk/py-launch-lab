name: Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "README.md"
      - "mkdocs.yml"
  pull_request:
    paths:
      - "docs/**"
      - "README.md"
      - "mkdocs.yml"

permissions:
  contents: read

concurrency:
  group: "docs-${{ github.event.pull_request.number || github.ref }}"
  cancel-in-progress: true

jobs:
  validate:
    name: Validate docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check Markdown files exist
        run: |
          test -f README.md
          test -f docs/plan.md
          test -f docs/overview.md
          test -f docs/windows-launch-semantics.md
          test -f docs/scenario-matrix.md
          test -f mkdocs.yml
          echo "All docs present."

  build:
    name: Build docs
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install docs dependencies
        run: uv sync --extra docs

      - name: Build docs with mkdocs
        run: uv run mkdocs build --strict

      - name: Take site screenshots
        run: |
          pip install playwright
          python -m playwright install chromium --with-deps
          mkdir -p screenshots
          python3 << 'SCRIPT'
          from playwright.sync_api import sync_playwright
          import http.server, threading, os

          if not os.path.isdir("site"):
              print("No site directory found; skipping screenshots.")
              exit(0)

          os.chdir("site")
          handler = http.server.SimpleHTTPRequestHandler
          httpd = http.server.HTTPServer(("127.0.0.1", 8080), handler)
          thread = threading.Thread(target=httpd.serve_forever)
          thread.daemon = True
          thread.start()

          with sync_playwright() as p:
              browser = p.chromium.launch()
              page = browser.new_page(viewport={"width": 1400, "height": 900})
              page.goto("http://127.0.0.1:8080/")
              page.wait_for_load_state("networkidle")
              page.screenshot(path="../screenshots/homepage.png")
              page.goto("http://127.0.0.1:8080/report/")
              page.wait_for_load_state("networkidle")
              page.screenshot(path="../screenshots/report.png", full_page=True)
              browser.close()

          httpd.shutdown()
          print("Screenshots saved.")
          SCRIPT
        continue-on-error: true

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docs-screenshots
          path: screenshots/
          if-no-files-found: ignore

      # upload-pages-artifact may fail on PRs (no pages:write permission).
      # This is expected — the artifact is only consumed by the deploy job
      # which only runs on main.
      - name: Upload Pages site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site
        continue-on-error: true

  deploy:
    name: Deploy to GitHub Pages (docs-only)
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    concurrency:
      group: "pages"
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
