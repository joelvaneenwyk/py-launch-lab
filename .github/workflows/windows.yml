name: Windows CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      uv-version:
        description: "uv version to test (e.g. '0.7.12'). Leave empty for latest."
        required: false
        default: ""
        type: string
      custom-uv-source:
        description: "Custom uv source (git URL or path). Leave empty to use default fork."
        required: false
        default: "https://github.com/joelvaneenwyk/uv"
        type: string
      skip-custom-uv:
        description: "Set to 'true' to skip the custom uv build and comparison run."
        required: false
        default: "false"
        type: string

jobs:
  python-tests:
    name: Python tests (Windows)
    runs-on: windows-latest
    permissions:
      contents: read
      models: read
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          version: ${{ github.event.inputs.uv-version || 'latest' }}

      - name: Set up Python
        run: uv python install 3.12

      - name: Print environment info
        shell: bash
        run: |
          echo "## Environment" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **OS:** $(uname -a)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Python:** $(uv run python --version)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **uv:** $(uv --version)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run unit tests
        run: uv run pytest tests/ -v --ignore=tests/integration

      - name: Run integration tests
        run: uv run pytest tests/integration -v
        continue-on-error: true

      - name: Run full scenario matrix (official uv)
        run: uv run py-launch-lab matrix run
        continue-on-error: true

      # -- Custom uv comparison run ------------------------------------------
      # Build the custom uv fork from source and re-run the matrix so that
      # artifacts from both versions coexist in artifacts/json/ (they have
      # different uv_version_hash suffixes in their filenames).

      - name: Set up Rust toolchain (for custom uv build)
        if: ${{ github.event.inputs.skip-custom-uv != 'true' }}
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
        continue-on-error: true

      - name: Restore cargo registry cache
        if: ${{ github.event.inputs.skip-custom-uv != 'true' }}
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-registry-${{ runner.os }}-${{ hashFiles('.cargo/config.toml') }}-v1
          restore-keys: |
            cargo-registry-${{ runner.os }}-
        continue-on-error: true

      - name: Build custom uv from fork
        id: build-custom-uv
        if: ${{ github.event.inputs.skip-custom-uv != 'true' }}
        env:
          CUSTOM_UV_SOURCE: ${{ github.event.inputs.custom-uv-source || 'https://github.com/joelvaneenwyk/uv' }}
        run: uv run py-launch-lab setup-uv "$env:CUSTOM_UV_SOURCE"
        continue-on-error: true

      - name: Run full scenario matrix (custom uv)
        if: ${{ steps.build-custom-uv.outcome == 'success' }}
        env:
          CUSTOM_UV_SOURCE: ${{ github.event.inputs.custom-uv-source || 'https://github.com/joelvaneenwyk/uv' }}
        run: uv run py-launch-lab matrix run --custom-uv "$env:CUSTOM_UV_SOURCE"
        continue-on-error: true

      # -- Report generation --------------------------------------------------

      - name: Generate report
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: uv run py-launch-lab report build --findings docs/findings
        continue-on-error: true

      - name: Write job summary
        if: always()
        shell: bash
        run: |
          if [ -f "artifacts/markdown/report.md" ]; then
            cat artifacts/markdown/report.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "> [!WARNING]" >> "$GITHUB_STEP_SUMMARY"
            echo "> No scenario report was generated." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload JSON artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scenario-results-json
          path: artifacts/json/
          if-no-files-found: ignore

      - name: Upload Markdown report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scenario-report-markdown
          path: artifacts/markdown/
          if-no-files-found: ignore

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scenario-report-html
          path: artifacts/html/
          if-no-files-found: ignore

      - name: Upload findings
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docs-findings
          path: docs/findings/
          if-no-files-found: ignore

  rust-shim:
    name: Rust shim (Windows)
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Build pyshim-win
        id: build
        working-directory: crates/pyshim-win
        run: cargo build

      - name: Run Rust tests
        id: test
        working-directory: crates/pyshim-win
        run: cargo test

      - name: Write job summary
        if: always()
        shell: bash
        run: |
          echo "## Rust Shim (pyshim-win) Build Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Step | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "| --- | --- |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Build | ${{ steps.build.outcome }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tests | ${{ steps.test.outcome }} |" >> "$GITHUB_STEP_SUMMARY"

  python-tests-ubuntu:
    name: Python tests (Ubuntu -- import/schema only)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          version: ${{ github.event.inputs.uv-version || 'latest' }}

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run unit tests
        run: uv run pytest tests/ -v --ignore=tests/integration

      - name: Write job summary
        if: always()
        shell: bash
        run: |
          echo "## Python Tests (Ubuntu) Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **uv:** $(uv --version)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Import and schema validation tests on Ubuntu." >> "$GITHUB_STEP_SUMMARY"
