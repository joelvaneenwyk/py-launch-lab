name: Windows CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-tests:
    name: Python tests (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run unit tests
        run: uv run pytest tests/ -v --ignore=tests/integration

      - name: Run integration tests
        run: uv run pytest tests/integration -v
        continue-on-error: true

      - name: Run full scenario matrix
        run: uv run py-launch-lab matrix run
        continue-on-error: true

      - name: Generate report
        run: uv run py-launch-lab report build --findings docs/findings
        continue-on-error: true

      - name: Upload JSON artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scenario-results-json
          path: artifacts/json/
          if-no-files-found: ignore

      - name: Upload Markdown report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scenario-report-markdown
          path: artifacts/markdown/
          if-no-files-found: ignore

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scenario-report-html
          path: artifacts/html/
          if-no-files-found: ignore

      - name: Upload findings
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docs-findings
          path: docs/findings/
          if-no-files-found: ignore

  rust-shim:
    name: Rust shim (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Build pyshim-win
        working-directory: crates/pyshim-win
        run: cargo build

      - name: Run Rust tests
        working-directory: crates/pyshim-win
        run: cargo test

  python-tests-ubuntu:
    name: Python tests (Ubuntu — import/schema only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run unit tests
        run: uv run pytest tests/ -v --ignore=tests/integration
