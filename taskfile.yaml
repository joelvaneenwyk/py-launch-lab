# https://taskfile.dev
version: "3"

vars:
  PYTHON: uv run python
  PKG: launch_lab
  UV_VERSION: '{{.UV_VERSION | default "latest"}}'
  CUSTOM_UV: '{{.CUSTOM_UV | default "https://github.com/joelvaneenwyk/uv.git"}}'

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task: test
      - task: matrix-run
      - task: report

  setup-custom-uv:
    desc: Build/resolve a custom uv binary (set CUSTOM_UV=<path-or-url>)
    status:
      - "{{if .CUSTOM_UV}}false{{else}}true{{end}}"
    cmds:
      - uv run py-launch-lab setup-uv {{.CUSTOM_UV}}

  install:
    desc: Install the project in development mode
    cmds:
      - uv sync --extra dev

  install-uv:
    desc: Install a specific version of uv (set UV_VERSION=x.y.z)
    cmds:
      - cmd: echo "Installing uv {{.UV_VERSION}}..."
      - cmd: 'pip install {{if eq .UV_VERSION "latest"}}uv{{else}}uv=={{.UV_VERSION}}{{end}}'

  lint:
    desc: Run ruff linter
    cmds:
      - uv run ruff check --preview --fix --unsafe-fixes .

  format:
    desc: Run ruff formatter
    cmds:
      - task: lint
      - uv run ruff format --preview .

  typecheck:
    desc: Run mypy type checker
    cmds:
      - uv run mypy src

  test:
    desc: Run unit tests
    deps:
      - setup-custom-uv
    cmds:
      - uv run pytest tests/ -v
    env:
      CUSTOM_UV: "{{.CUSTOM_UV}}"

  env-info:
    desc: Print environment info (OS, Python, uv versions)
    cmds:
      - uv run python -c "import platform; print('OS:', platform.platform())"
      - uv run python --version
      - uv --version

  run:
    desc: Run the CLI
    cmds:
      - uv run py-launch-lab {{.CLI_ARGS}} {{if .CUSTOM_UV}}--custom-uv {{.CUSTOM_UV}}{{end}}

  matrix-run:
    desc: Run the full scenario matrix
    deps:
      - setup-custom-uv
    cmds:
      - uv run py-launch-lab matrix run {{if .CUSTOM_UV}}--custom-uv {{.CUSTOM_UV}}{{end}}

  report:
    desc: Build the report
    cmds:
      - uv run py-launch-lab report build {{if .FORCE}}--force{{end}}
    vars:
      FORCE: '{{.FORCE | default ""}}'

  shim-build:
    desc: Build the Rust shim (Windows only)
    dir: crates/pyshim-win
    cmds:
      - cargo build --release

  clean:
    desc: Remove build artifacts
    cmds:
      - powershell -File tools/clean.ps1
