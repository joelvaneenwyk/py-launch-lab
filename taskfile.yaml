# https://taskfile.dev
version: "3"

vars:
  PYTHON: uv run python
  PKG: launch_lab
  UV_VERSION: '{{.UV_VERSION | default "latest"}}'
  CUSTOM_UV: '{{.CUSTOM_UV | default "https://github.com/joelvaneenwyk/uv.git"}}'

tasks:
  default:
    desc: Run matrix, build reports, and start local server
    cmds:
      - git add .
      - git pull --rebase --autostash
      - cmd: |
          uv venv --clear || true
      - task: serve

  serve:
    desc: Run matrix, build reports, and serve HTML report locally
    deps:
      - setup-custom-uv
    cmds:
      - uv run py-launch-lab serve {{if .CUSTOM_UV}}--custom-uv {{.CUSTOM_UV}}{{end}} {{if .FORCE}}--force{{end}} {{if .PORT}}--port {{.PORT}}{{end}} {{if .NO_BROWSER}}--no-browser{{end}} {{if .SKIP_MATRIX}}--skip-matrix{{end}}
    vars:
      FORCE: '{{.FORCE | default ""}}'
      PORT: '{{.PORT | default ""}}'
      NO_BROWSER: '{{.NO_BROWSER | default ""}}'
      SKIP_MATRIX: '{{.SKIP_MATRIX | default ""}}'

  setup-custom-uv:
    aliases: [setup]
    desc: Build/resolve a custom uv binary (set CUSTOM_UV=<path-or-url>)
    status:
      - "{{if .CUSTOM_UV}}false{{else}}true{{end}}"
    cmds:
      - uv run py-launch-lab setup-uv {{.CUSTOM_UV}}

  install:
    desc: Install the project in development mode
    cmds:
      - uv sync --extra dev

  install-uv:
    desc: Install a specific version of uv (set UV_VERSION=x.y.z)
    cmds:
      - cmd: echo "Installing uv {{.UV_VERSION}}..."
      - cmd: 'pip install {{if eq .UV_VERSION "latest"}}uv{{else}}uv=={{.UV_VERSION}}{{end}}'

  lint:
    desc: Run ruff linter
    cmds:
      - uv run ruff check --preview --fix --unsafe-fixes .

  format:
    desc: Run ruff formatter
    cmds:
      - task: lint
      - uv run ruff format --preview .

  typecheck:
    desc: Run mypy type checker
    cmds:
      - uv run mypy src

  test:
    desc: Run unit tests
    deps:
      - setup-custom-uv
    cmds:
      - uv run pytest tests/ -v
    env:
      CUSTOM_UV: "{{.CUSTOM_UV}}"

  env-info:
    desc: Print environment info (OS, Python, uv versions)
    cmds:
      - uv run python -c "import platform; print('OS:', platform.platform())"
      - uv run python --version
      - uv --version

  run:
    desc: Run the CLI
    cmds:
      - uv run py-launch-lab {{.CLI_ARGS}} {{if .CUSTOM_UV}}--custom-uv {{.CUSTOM_UV}}{{end}}

  matrix-run:
    desc: Run the full scenario matrix
    deps:
      - setup-custom-uv
    cmds:
      - uv run py-launch-lab matrix run {{if .CUSTOM_UV}}--custom-uv {{.CUSTOM_UV}}{{end}}

  report:
    desc: Build the report (auto-runs matrix if no artifacts exist)
    deps:
      - setup-custom-uv
    cmds:
      - uv run py-launch-lab report build {{if .CUSTOM_UV}}--custom-uv {{.CUSTOM_UV}}{{end}} {{if .FORCE}}--force{{end}}
    vars:
      FORCE: '{{.FORCE | default ""}}'

  # ---------------------------------------------------------------------------
  # Individual scenario tasks — call e.g. `task venv-gui-entrypoint`
  # ---------------------------------------------------------------------------

  _scenario:
    internal: true
    deps: [setup-custom-uv]
    cmds:
      - uv run py-launch-lab scenario run "{{.SCENARIO}}" {{if .CUSTOM_UV}}--custom-uv {{.CUSTOM_UV}}{{end}}

  # --- Direct python / pythonw ---
  python-script-py:
    desc: "Scenario: python.exe running .py"
    cmds: [{ task: _scenario, vars: { SCENARIO: python-script-py } }]

  python-script-pyw:
    desc: "Scenario: python.exe running .pyw"
    cmds: [{ task: _scenario, vars: { SCENARIO: python-script-pyw } }]

  pythonw-script-py:
    desc: "Scenario: pythonw.exe running .py"
    cmds: [{ task: _scenario, vars: { SCENARIO: pythonw-script-py } }]

  pythonw-script-pyw:
    desc: "Scenario: pythonw.exe running .pyw"
    cmds: [{ task: _scenario, vars: { SCENARIO: pythonw-script-pyw } }]

  # --- uv run ---
  uv-run-script-py:
    desc: "Scenario: uv run hello.py"
    cmds: [{ task: _scenario, vars: { SCENARIO: uv-run-script-py } }]

  uv-run-script-pyw:
    desc: "Scenario: uv run hello.pyw"
    cmds: [{ task: _scenario, vars: { SCENARIO: uv-run-script-pyw } }]

  uv-run-gui-script:
    desc: "Scenario: uv run --gui-script"
    cmds: [{ task: _scenario, vars: { SCENARIO: uv-run-gui-script } }]

  # --- uv tool ---
  uv-tool-install-console:
    desc: "Scenario: uv tool install (console pkg)"
    cmds: [{ task: _scenario, vars: { SCENARIO: uv-tool-install-console } }]

  uv-tool-install-gui:
    desc: "Scenario: uv tool install (GUI pkg)"
    cmds: [{ task: _scenario, vars: { SCENARIO: uv-tool-install-gui } }]

  uv-tool-run-pkg-console:
    desc: "Scenario: uv tool run console entrypoint"
    cmds: [{ task: _scenario, vars: { SCENARIO: uv-tool-run-pkg-console } }]

  # --- uvw ---
  uvw-run-script-py:
    desc: "Scenario: uvw run hello.py (GUI subsystem)"
    cmds: [{ task: _scenario, vars: { SCENARIO: uvw-run-script-py } }]

  # --- uvx ---
  uvx-pkg-console:
    desc: "Scenario: uvx --from pkg_console"
    cmds: [{ task: _scenario, vars: { SCENARIO: uvx-pkg-console } }]

  # --- venv-direct ---
  venv-console-entrypoint:
    desc: "Scenario: venv console entry-point wrapper"
    cmds: [{ task: _scenario, vars: { SCENARIO: venv-console-entrypoint } }]

  venv-gui-entrypoint:
    desc: "Scenario: venv GUI entry-point wrapper"
    cmds: [{ task: _scenario, vars: { SCENARIO: venv-gui-entrypoint } }]

  venv-dual-console-entrypoint:
    desc: "Scenario: dual-mode console entry-point"
    cmds: [{ task: _scenario, vars: { SCENARIO: venv-dual-console-entrypoint } }]

  venv-dual-gui-entrypoint:
    desc: "Scenario: dual-mode GUI entry-point"
    cmds: [{ task: _scenario, vars: { SCENARIO: venv-dual-gui-entrypoint } }]

  venv-python-script-py:
    desc: "Scenario: venv python.exe running .py"
    cmds: [{ task: _scenario, vars: { SCENARIO: venv-python-script-py } }]

  venv-pythonw-script-py:
    desc: "Scenario: venv pythonw.exe running .py"
    cmds: [{ task: _scenario, vars: { SCENARIO: venv-pythonw-script-py } }]

  # --- shim ---
  shim-python-script-py:
    desc: "Scenario: pyshim-win wrapping python.exe"
    cmds: [{ task: _scenario, vars: { SCENARIO: shim-python-script-py } }]

  shim-uv-run-script-py:
    desc: "Scenario: pyshim-win wrapping uv run"
    cmds: [{ task: _scenario, vars: { SCENARIO: shim-uv-run-script-py } }]

  # ---------------------------------------------------------------------------

  shim-build:
    desc: Build the Rust shim (Windows only)
    dir: crates/pyshim-win
    cmds:
      - cargo build --release

  clean:
    desc: Remove build artifacts
    cmds:
      - powershell -File tools/clean.ps1
